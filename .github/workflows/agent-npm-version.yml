name: agent-npm-version

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "apps/agent/**"
      - "!apps/agent/package.json"

jobs:
  bump-agent-npm-version:
    if: github.actor != 'github-actions[bot]' && github.ref_name == 'main'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: npm ci

      - name: Bump agent package patch version
        run: npm run version:agent:patch

      - name: Read bumped version
        id: read-version
        run: |
          NEW_VERSION="$(node -e \"const fs=require('node:fs'); const pkg=JSON.parse(fs.readFileSync('apps/agent/package.json','utf8')); process.stdout.write(pkg.version);\")"
          echo "version=${NEW_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Commit and tag
        id: git-release
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add apps/agent/package.json
          if git diff --cached --quiet; then
            echo "No version changes to commit."
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git commit -m "chore(agent): bump npm version to ${{ steps.read-version.outputs.version }} [skip ci]"
          git tag "agent-cli-v${{ steps.read-version.outputs.version }}"

          git push origin "HEAD:${GITHUB_REF_NAME}"
          git push origin "agent-cli-v${{ steps.read-version.outputs.version }}"
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Build agent npm package
        if: steps.git-release.outputs.changed == 'true'
        run: npm run build:package:agent-cli

      - name: Publish agent npm package
        if: steps.git-release.outputs.changed == 'true'
        run: npm publish ./dist-packages/agent-cli --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
